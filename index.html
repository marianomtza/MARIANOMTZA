<style>
/* ============================================
   Mariano Martínez — cinematic edition
   ============================================ */
:root {
  --bg: #0a0610;
  --bg-2: #050308;
  --fg: #f4f1f7;
  --fg-dim: #8a7fa0;
  --fg-mute: #4a435a;
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.16);
  --accent: #9b5fd6;
  --accent-soft: #6b3fa8;
  --accent-deep: #3d1d6e;
  --sans: "Inter", system-ui, sans-serif;
  --serif: "Instrument Serif", "Times New Roman", serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --maxw: 1440px;
  --pad: clamp(20px, 4vw, 64px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--fg); }
body {
  font-family: var(--sans);
  font-weight: 300;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  position: relative;
  cursor: none;
}
@media (pointer: coarse) { body { cursor: auto; } .cursor, .cursor-trail { display: none !important; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .cursor, .cursor-trail { display: none !important; }
  body { cursor: auto !important; }
}
a, button { cursor: none; }
@media (pointer: coarse) { a, button { cursor: pointer; } }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; }
img, svg { display: block; max-width: 100%; }
::selection { background: var(--accent); color: #fff; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

/* ============================================
   CUSTOM CURSOR
   ============================================ */
.cursor {
  position: fixed; top: 0; left: 0;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .3s, height .3s, background .3s, border-radius .3s, mix-blend-mode .3s;
  mix-blend-mode: difference;
  will-change: transform;
}
.cursor.hovering {
  width: 60px; height: 60px;
  background: rgba(155, 95, 214, 0.5);
  backdrop-filter: blur(4px);
}
.cursor.text { width: 2px; height: 28px; border-radius: 1px; background: var(--fg); }
.cursor-trail {
  position: fixed; top: 0; left: 0;
  width: 40px; height: 40px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  opacity: 0.4;
  will-change: transform;
}

/* ============================================
   GRAIN + VIGNETTE
   ============================================ */
.grain {
  position: fixed; inset: -50%; z-index: 90;
  pointer-events: none;
  opacity: 0.09;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
  background-size: 200px 200px;
  animation: grain 0.6s steps(8) infinite;
  mix-blend-mode: overlay;
}
@keyframes grain {
  0%  { transform: translate(0,0); }
  10% { transform: translate(-5%,-10%); }
  20% { transform: translate(-15%,5%); }
  30% { transform: translate(7%,-25%); }
  40% { transform: translate(-5%,25%); }
  50% { transform: translate(-15%,10%); }
  60% { transform: translate(15%,0%); }
  70% { transform: translate(0%,15%); }
  80% { transform: translate(3%,-10%); }
  90% { transform: translate(-10%,10%); }
  100%{ transform: translate(0,0); }
}
.vignette {
  position: fixed; inset: 0; z-index: 88;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
}
body.no-grain .grain { display: none; }

/* ============================================
   BLOB BG + STARS
   ============================================ */
.blob-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
  background: radial-gradient(ellipse at 20% 0%, #1a0a2e 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, #120825 0%, transparent 60%),
              var(--bg);
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: 0.55;
  mix-blend-mode: screen;
  will-change: transform;
  transition: transform .6s cubic-bezier(0.22, 1, 0.36, 1);
}
.blob.b1 { width: 620px; height: 580px; background: var(--accent-soft); top: -180px; left: -140px; animation: float1 22s ease-in-out infinite; }
.blob.b2 { width: 540px; height: 520px; background: var(--accent); top: 40%; right: -160px; opacity: 0.45; animation: float2 26s ease-in-out infinite; }
.blob.b3 { width: 460px; height: 440px; background: var(--accent-deep); bottom: -160px; left: 30%; opacity: 0.5; animation: float3 30s ease-in-out infinite; }
.blob.ring {
  border-radius: 50%; background: transparent;
  border: 2px solid var(--accent); filter: blur(2px);
  opacity: 0.35; width: 380px; height: 380px;
  top: 10%; left: 45%;
  animation: float2 34s ease-in-out infinite reverse;
  mix-blend-mode: normal;
}
@keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 60px) scale(1.08); } }
@keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px, -40px) scale(1.12); } }
@keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px, -50px) scale(0.95); } }
body.no-motion .blob { animation: none; }

@media (max-width: 800px) {
  .blob { filter: blur(50px); opacity: 0.4; }
  .blob.b1 { width: 380px; height: 380px; }
  .blob.b2 { width: 320px; height: 320px; }
  .blob.b3 { width: 300px; height: 300px; }
  .blob.ring { display: none; }
}

.stars { position: absolute; inset: 0; background-image:
  radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
  radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
  radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.4), transparent),
  radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.3), transparent),
  radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.35), transparent),
  radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.25), transparent);
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }

.content { position: relative; z-index: 1; }
.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad); }

/* ============================================
   LOADER
   ============================================ */
.loader {
  position: fixed; inset: 0; z-index: 200;
  background: #050308;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: var(--pad);
  transition: transform 1s cubic-bezier(0.76, 0, 0.24, 1);
}
.loader.done { transform: translateY(-100%); }
.loader-top { display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--fg-dim); }
.loader-center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-weight: 800;
  font-size: clamp(60px, 20vw, 240px);
  letter-spacing: -0.04em;
  color: var(--fg);
}
.loader-count { display: inline-flex; align-items: baseline; gap: 12px; }
.loader-count .pct { color: var(--accent); font-family: var(--serif); font-style: italic; font-weight: 400; }
.loader-bottom {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--fg-dim);
  display: flex; justify-content: space-between; align-items: end; gap: 16px;
}
.loader-bar { flex: 1; max-width: 60%; height: 1px; background: var(--line); position: relative; overflow: hidden; }
.loader-bar::after { content: ""; position: absolute; inset: 0; background: var(--accent); transform-origin: left; transform: scaleX(var(--p, 0)); transition: transform .3s; }

/* ============================================
   NAV
   ============================================ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 18px var(--pad);
  border-bottom: 1px solid rgba(155, 95, 214, 0.2);
  background: linear-gradient(to bottom, rgba(10,6,16,0.8), rgba(10,6,16,0.3));
  backdrop-filter: blur(14px);
  transform: translateY(-100%);
  transition: transform .9s cubic-bezier(0.22, 1, 0.36, 1);
}
.nav.revealed { transform: translateY(0); }
.nav-inner {
  max-width: var(--maxw); margin: 0 auto;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 24px;
}
.nav-logo { font-weight: 500; font-size: 14px; letter-spacing: 0.01em; }
.nav-logo .dim { color: var(--fg-dim); font-weight: 300; }
.nav-links {
  display: flex; gap: 36px; justify-content: center;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.22em; text-transform: uppercase;
}
.nav-links a { color: var(--fg-dim); transition: color .2s; position: relative; }
.nav-links a::after { content: ""; position: absolute; bottom: -6px; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform .3s; }
.nav-links a:hover { color: var(--fg); }
.nav-links a:hover::after { transform: scaleX(1); }
.nav-right { justify-self: end; display: flex; align-items: center; gap: 16px; }
.sound-toggle {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--fg-dim);
  transition: color .2s;
}
.sound-toggle:hover { color: var(--fg); }
.sound-bars { display: inline-flex; gap: 2px; align-items: flex-end; height: 14px; }
.sound-bars span {
  width: 2px; background: currentColor; height: 40%;
  animation: sbar 0.8s ease-in-out infinite alternate;
}
.sound-bars span:nth-child(2) { animation-delay: .15s; height: 80%; }
.sound-bars span:nth-child(3) { animation-delay: .3s; height: 55%; }
.sound-bars span:nth-child(4) { animation-delay: .45s; height: 90%; }
.sound-toggle.off .sound-bars span { animation: none; height: 40%; }
.sound-toggle.off .sound-bars span:nth-child(1) { height: 20%; }
.sound-toggle.off .sound-bars span:nth-child(4) { height: 20%; }
@keyframes sbar { from { height: 20%; } to { height: 100%; } }

.nav-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  padding: 10px 20px;
  border: 1px solid var(--line-strong);
  color: var(--fg);
  transition: all .2s;
}
.nav-btn:hover { background: var(--accent); border-color: var(--accent); }

.nav-burger { display: none; width: 36px; height: 36px; flex-direction: column; justify-content: center; gap: 5px; align-items: center; }
.nav-burger span { display: block; width: 22px; height: 1.5px; background: var(--fg); transition: transform .3s, opacity .2s; }
.nav-burger.on span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.on span:nth-child(2) { opacity: 0; }
.nav-burger.on span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-drawer { position: fixed; inset: 0; background: rgba(5,3,8,0.72); backdrop-filter: blur(8px); z-index: 49; opacity: 0; pointer-events: none; transition: opacity .3s; }
.nav-drawer.open { opacity: 1; pointer-events: auto; }
.nav-drawer-inner {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(82vw, 360px);
  background: rgba(10,6,16,0.98);
  border-left: 1px solid var(--line-strong);
  padding: 90px 28px 28px;
  display: flex; flex-direction: column; gap: 28px;
  font-family: var(--mono); font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase;
  transform: translateX(100%); transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
}
.nav-drawer.open .nav-drawer-inner { transform: translateX(0); }
.nav-drawer a { color: var(--fg); padding: 14px 0; border-bottom: 1px solid var(--line); }
.nav-drawer a:hover { color: var(--accent); }

@media (max-width: 800px) {
  .nav-inner { grid-template-columns: 1fr auto; gap: 12px; }
  .nav-links { display: none; }
  .nav-btn { display: none; }
  .nav-burger { display: inline-flex; }
  .sound-toggle .sound-label { display: none; }
}

/* ============================================
   HERO
   ============================================ */
.hero {
  position: relative;
  min-height: 100vh;
  padding: 140px var(--pad) 60px;
  max-width: var(--maxw); margin: 0 auto;
  display: flex; flex-direction: column; justify-content: space-between;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--fg-dim);
  margin-bottom: 30px;
  display: inline-flex; align-items: center; gap: 14px;
  opacity: 0; transform: translateY(20px);
  animation: reveal .9s .3s forwards cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes reveal { to { opacity: 1; transform: none; } }

.hero-title {
  font-family: var(--sans);
  font-weight: 800;
  font-size: clamp(72px, 14vw, 220px);
  line-height: 0.88;
  letter-spacing: -0.04em;
  text-transform: uppercase;
  color: var(--fg);
  margin-bottom: 40px;
  position: relative;
  display: flex; flex-wrap: wrap;
  gap: 0 0.2em;
}
.hero-title .word { display: inline-flex; overflow: hidden; }
.hero-title .char {
  display: inline-block;
  transform: translateY(110%) rotate(8deg);
  transition: transform .5s cubic-bezier(0.22, 1, 0.36, 1), color .2s;
  will-change: transform;
}
.hero-title.revealed .char { transform: none; }
.hero-title .char:hover { color: var(--accent); transform: translateY(-8px) !important; transition: transform .15s cubic-bezier(0.22, 1, 0.36, 1), color .15s; }
.hero-title .piano-char { cursor: none; }
@media (pointer: coarse) { .hero-title .piano-char { cursor: pointer; } }

.hero-bottom {
  display: grid; grid-template-columns: 1.2fr 1fr;
  gap: 80px; align-items: end; margin-top: auto;
  opacity: 0; transform: translateY(20px);
  animation: reveal .9s 1.2s forwards cubic-bezier(0.22, 1, 0.36, 1);
}
.hero-role {
  font-family: var(--mono); font-size: 13px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--fg);
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
  min-height: 24px;
}
.hero-role::before { content: "→"; color: var(--accent); font-size: 14px; }
.hero-role-label { color: var(--fg); }
.hero-role-sep { color: var(--accent); }
.hero-role-tag { color: var(--fg-dim); font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 16px; letter-spacing: 0; text-transform: none; }
.hero-desc { color: var(--fg-dim); font-size: 15px; line-height: 1.65; max-width: 42ch; text-wrap: pretty; }
.hero-desc strong { color: var(--fg); font-weight: 500; }

.hero-ctas { display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; }

.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 18px 32px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  transition: transform .3s cubic-bezier(0.22, 1, 0.36, 1), background .25s, box-shadow .25s, border-color .25s, color .25s, opacity .2s;
  white-space: nowrap;
  position: relative;
  will-change: transform;
}
.btn.small { padding: 12px 22px; font-size: 10px; }
.btn.big   { padding: 20px 36px; font-size: 12px; }
.btn.primary { background: var(--accent); color: #fff; box-shadow: 0 8px 32px rgba(155, 95, 214, 0.35); }
.btn.primary:hover { background: #b67de8; box-shadow: 0 16px 50px rgba(155, 95, 214, 0.6); }
.btn.ghost { border: 1px solid var(--line-strong); color: var(--fg); }
.btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn.disabled { opacity: 0.35; pointer-events: none; cursor: not-allowed; border: 1px dashed var(--line-strong); }
.btn .arr { transition: transform .3s; }
.btn:hover .arr { transform: translateX(6px); }

.hero-scroll {
  margin-top: 60px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--fg-dim);
  display: inline-flex; align-items: center; gap: 14px;
}
.hero-scroll::before {
  content: ""; width: 40px; height: 1px; background: var(--fg-dim);
  animation: scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine { 0%,100% { transform: scaleX(1); transform-origin: left; } 50% { transform: scaleX(0.3); } }

@media (max-width: 800px) {
  .hero { padding: 110px var(--pad) 48px; }
  .hero-bottom { grid-template-columns: 1fr; gap: 32px; }
  .hero-title { gap: 0; }
  .hero-ctas { width: 100%; }
  .hero-ctas .btn { flex: 1; padding: 16px 20px; }
}

/* ============================================
   MARQUEE BANDS
   ============================================ */
.band {
  border-block: 1px solid var(--line);
  padding: 26px 0;
  overflow: hidden;
  background: rgba(5, 3, 8, 0.4);
  position: relative;
}
.band-track {
  display: flex; gap: 48px; white-space: nowrap;
  animation: scroll 40s linear infinite;
  will-change: transform;
}
.band.reverse .band-track { animation-direction: reverse; }
.band-item {
  display: inline-flex; align-items: center; gap: 32px;
  font-family: var(--sans); font-weight: 700;
  font-size: clamp(28px, 4vw, 56px);
  letter-spacing: -0.02em; text-transform: uppercase;
  color: var(--fg);
}
.band-item.band-link { transition: color .2s; }
.band-item.band-link:hover { color: var(--accent); }
.band-item .sep { color: var(--accent); font-family: var(--serif); font-style: italic; font-weight: 400; }
.band-item:nth-child(even) { color: transparent; -webkit-text-stroke: 1px var(--fg-dim); }
.band-item:nth-child(even).band-link:hover { -webkit-text-stroke: 1px var(--accent); color: transparent; }
@keyframes scroll { to { transform: translateX(-50%); } }
body.no-motion .band-track { animation: none; }

/* ============================================
   SECTION SHELL + REVEAL
   ============================================ */
.section { position: relative; padding: clamp(100px, 14vh, 180px) 0; }
.reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.22,1,0.36,1), transform 1s cubic-bezier(0.22,1,0.36,1); }
.reveal.in { opacity: 1; transform: none; }
.reveal-stagger > * { opacity: 0; transform: translateY(30px); transition: opacity .8s cubic-bezier(0.22,1,0.36,1), transform .8s cubic-bezier(0.22,1,0.36,1); }
.reveal-stagger.in > * { opacity: 1; transform: none; }
.reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
.reveal-stagger.in > *:nth-child(2) { transition-delay: 80ms; }
.reveal-stagger.in > *:nth-child(3) { transition-delay: 160ms; }
.reveal-stagger.in > *:nth-child(4) { transition-delay: 240ms; }
.reveal-stagger.in > *:nth-child(5) { transition-delay: 320ms; }
.reveal-stagger.in > *:nth-child(6) { transition-delay: 400ms; }
.reveal-stagger.in > *:nth-child(7) { transition-delay: 480ms; }
.reveal-stagger.in > *:nth-child(8) { transition-delay: 560ms; }
.reveal-stagger.in > *:nth-child(9) { transition-delay: 640ms; }
.reveal-stagger.in > *:nth-child(10){ transition-delay: 720ms; }

.section-intro {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 60px; align-items: start;
  margin-bottom: 80px;
}
.section-intro .side { font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); }
.section-intro .side::before { content: ""; display: block; width: 30px; height: 1px; background: var(--accent); margin-bottom: 16px; }
.section-h {
  font-family: var(--sans); font-weight: 700;
  font-size: clamp(44px, 6.4vw, 96px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  text-wrap: balance;
}
.section-h .ital { font-family: var(--serif); font-weight: 400; font-style: italic; color: var(--accent); font-size: 1.05em; letter-spacing: -0.01em; }
@media (max-width: 800px) { .section-intro { grid-template-columns: 1fr; gap: 20px; margin-bottom: 48px; } }

/* ============================================
   STATS
   ============================================ */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
.stat-card { background: rgba(10,6,16,0.6); padding: 36px 28px; display: flex; flex-direction: column; gap: 8px; min-height: 200px; }
.stat-n { font-family: var(--sans); font-weight: 800; font-size: clamp(56px, 7vw, 96px); line-height: 1; letter-spacing: -0.04em; color: var(--fg); }
.stat-card:nth-child(2) .stat-n,
.stat-card:nth-child(4) .stat-n { color: var(--accent); }
.stat-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); margin-top: auto; }
.stat-sub { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--fg-dim); margin-top: 4px; }
@media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }

/* ============================================
   EVENTS — Noches Memorables
   ============================================ */
.events-list { display: flex; flex-direction: column; }
.event-row {
  display: grid;
  grid-template-columns: 80px 1fr auto auto 60px;
  gap: 32px;
  padding: 28px 0;
  align-items: center;
  border-top: 1px solid var(--line);
  transition: padding .4s cubic-bezier(0.22, 1, 0.36, 1), background .4s;
  position: relative;
  overflow: hidden;
  color: inherit;
}
.event-row:last-child { border-bottom: 1px solid var(--line); }
.event-row::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(155,95,214,0.18), transparent 70%);
  transform: translateX(-100%);
  transition: transform .6s cubic-bezier(0.22, 1, 0.36, 1);
}
.event-row:hover::before { transform: translateX(0); }
.event-row:hover { padding-left: 28px; padding-right: 28px; }
.event-row > * { position: relative; z-index: 1; }
.event-row .idx { font-family: var(--mono); font-size: 12px; color: var(--fg-dim); letter-spacing: 0.14em; }
.event-row .name {
  font-family: var(--sans); font-weight: 600;
  font-size: clamp(22px, 3vw, 40px); line-height: 1.05;
  letter-spacing: -0.02em;
  transition: color .3s, transform .4s cubic-bezier(0.22,1,0.36,1);
}
.event-row:hover .name { color: var(--accent); transform: translateX(8px); }
.event-row .meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); }
.event-row .arr {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid; place-items: center;
  color: var(--fg-dim);
  transition: all .4s cubic-bezier(0.22, 1, 0.36, 1);
}
.event-row:hover .arr { background: var(--accent); border-color: var(--accent); color: #fff; transform: rotate(-45deg) scale(1.1); }
@media (max-width: 800px) {
  .event-row { grid-template-columns: 40px 1fr 40px; gap: 14px; }
  .event-row .meta { display: none; }
}

/* ============================================
   ROSTER + ARTIST MODAL
   ============================================ */
.roster-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: 2px;
  overflow: hidden;
  perspective: 1200px;
}
.roster-card {
  background: rgba(10, 6, 16, 0.6);
  padding: 28px 22px;
  display: flex; flex-direction: column; gap: 16px;
  min-height: 220px;
  position: relative;
  transition: background .4s;
  transform-style: preserve-3d;
  will-change: transform;
  overflow: hidden;
  text-align: left;
}
.roster-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(155,95,214,0.35), transparent 50%);
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.roster-card:hover::before { opacity: 1; }
.roster-card:hover { background: rgba(155, 95, 214, 0.04); }
.roster-card .idx { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); letter-spacing: 0.2em; }
.roster-card .name {
  font-family: var(--sans); font-weight: 600;
  font-size: clamp(20px, 1.8vw, 26px); line-height: 1;
  letter-spacing: -0.02em;
  margin-top: auto;
  transform: translateZ(20px);
}
.roster-card .circle {
  position: absolute; top: 18px; right: 18px;
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid; place-items: center;
  color: var(--fg-dim);
  transition: all .3s;
  transform: translateZ(30px);
}
.roster-card:hover .circle { border-color: var(--accent); color: var(--accent); transform: translateZ(30px) rotate(-45deg); }

@media (max-width: 1100px) { .roster-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px)  { .roster-grid { grid-template-columns: repeat(2, 1fr); } }

/* Artist Modal */
.artist-modal { position: fixed; inset: 0; z-index: 220; display: grid; place-items: center; padding: 24px; background: rgba(5, 3, 8, 0.55); backdrop-filter: blur(18px); animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.artist-modal-panel {
  position: relative;
  width: min(900px, 100%);
  max-height: 90vh; overflow-y: auto;
  background: rgba(15, 10, 22, 0.96);
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 0;
  box-shadow: 0 30px 100px rgba(0,0,0,0.6);
  animation: scaleIn .35s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes scaleIn { from { opacity: 0; transform: scale(0.94) translateY(10px); } to { opacity: 1; transform: none; } }
.artist-modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.06); color: var(--fg);
  font-size: 22px; line-height: 1;
  display: grid; place-items: center;
  transition: background .2s;
  z-index: 2;
}
.artist-modal-close:hover { background: var(--accent); }

.artist-modal-photo {
  background: linear-gradient(135deg, var(--accent-soft), var(--accent-deep));
  min-height: 320px;
  display: grid; place-items: center;
  position: relative; overflow: hidden;
}
.artist-modal-photo img { width: 100%; height: 100%; object-fit: cover; }
.artist-photo-placeholder {
  font-family: var(--sans); font-weight: 800;
  font-size: clamp(64px, 9vw, 120px);
  letter-spacing: -0.04em;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.artist-modal-info { padding: 36px 32px; display: flex; flex-direction: column; gap: 20px; }
.artist-modal-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-dim); }
.artist-modal-name {
  font-family: var(--sans); font-weight: 700;
  font-size: clamp(32px, 3.6vw, 52px);
  line-height: 1; letter-spacing: -0.03em; color: var(--fg);
}
.artist-modal-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
.artist-modal-actions .btn { border: 1px solid var(--line-strong); color: var(--fg); }
.artist-modal-actions .btn:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
.artist-modal-info .btn.primary.big { align-self: flex-start; margin-top: auto; }

@media (max-width: 700px) {
  .artist-modal-panel { grid-template-columns: 1fr; max-height: 92vh; }
  .artist-modal-photo { min-height: 220px; }
  .artist-modal-info { padding: 28px 22px; }
}

/* ============================================
   BOOKING
   ============================================ */
.booking {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 80px; align-items: start;
}
.booking-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); margin-bottom: 32px; display: inline-flex; align-items: center; gap: 10px; }
.booking-eyebrow-line { display: inline-block; width: 24px; height: 1px; background: var(--accent); }
.booking-left h2 {
  font-family: var(--sans); font-weight: 700;
  font-size: clamp(48px, 6vw, 88px);
  line-height: 1.02; letter-spacing: -0.035em; text-wrap: balance;
}
.booking-left h2 .ital { font-family: var(--serif); font-weight: 400; font-style: italic; color: var(--accent); font-size: 1.05em; }
.booking-left .desc { margin-top: 32px; color: var(--fg-dim); font-size: 15px; line-height: 1.65; max-width: 38ch; }
.booking-info { margin-top: 48px; display: flex; flex-direction: column; gap: 28px; }
.binfo-block { display: flex; flex-direction: column; gap: 8px; }
.binfo-block .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); }
.binfo-block .v { font-size: 17px; font-weight: 500; }
.binfo-block .v a { position: relative; display: inline-block; }
.binfo-block .v a::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 1px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform .3s; }
.binfo-block .v a:hover { color: var(--accent); }
.binfo-block .v a:hover::after { transform: scaleX(1); }
.binfo-socials { display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
.binfo-socials a {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--fg-dim); transition: color .2s;
}
.binfo-socials a:hover { color: var(--accent); }

/* Mode toggle (Servicio / Artista) */
.booking-form-wrap { display: flex; flex-direction: column; gap: 20px; }
.mode-toggle {
  position: relative;
  display: grid; grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 4px;
  align-self: flex-start;
}
.mode-btn {
  position: relative; z-index: 2;
  padding: 10px 24px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--fg-dim);
  transition: color .25s;
  border-radius: 999px;
}
.mode-btn.active { color: #fff; }
.mode-indicator {
  position: absolute; top: 4px; bottom: 4px;
  width: calc(50% - 4px);
  background: var(--accent);
  border-radius: 999px;
  transition: transform .35s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 1;
  left: 4px;
}
.mode-indicator.artista { transform: translateX(100%); }

.form { display: flex; flex-direction: column; gap: 28px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.field { display: flex; flex-direction: column; gap: 10px; }
.field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); }
.field label .req { color: var(--accent); }
.field input, .field textarea, .field select {
  background: transparent;
  border: 0; border-bottom: 1px solid var(--line-strong);
  color: var(--fg); font: inherit; font-size: 15px;
  padding: 10px 0; outline: none;
  transition: border-color .2s;
  width: 100%;
}
.field input::placeholder, .field textarea::placeholder { color: var(--fg-mute); }
.field textarea { resize: vertical; min-height: 100px; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%238a7fa0' stroke-width='1.2' d='M1 1l5 5 5-5'/></svg>"); background-repeat: no-repeat; background-position: right 0 center; padding-right: 20px; }
.field select option { background: var(--bg); color: var(--fg); }

.form-foot { display: flex; justify-content: space-between; align-items: center; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
.form-foot .note { font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-dim); }
.submit-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
  padding: 18px 32px; border-radius: 999px;
  background: var(--accent); color: #fff;
  display: inline-flex; align-items: center; gap: 14px;
  box-shadow: 0 8px 32px rgba(155, 95, 214, 0.35);
  transition: all .25s;
}
.submit-btn:hover { background: #b67de8; transform: translateY(-2px); box-shadow: 0 16px 50px rgba(155, 95, 214, 0.6); }
.submit-btn.ok { background: #4ade80; box-shadow: 0 8px 32px rgba(74, 222, 128, 0.35); }
.submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.form-err { font-family: var(--mono); font-size: 11px; color: #ff6b6b; letter-spacing: .14em; text-transform: uppercase; margin-top: 6px; }

@media (max-width: 900px) {
  .booking { grid-template-columns: 1fr; gap: 60px; }
  .form-row { grid-template-columns: 1fr; gap: 28px; }
}

/* ============================================
   FOOTER
   ============================================ */
.footer-big {
  padding: 60px var(--pad) 0;
  max-width: var(--maxw); margin: 0 auto;
  font-family: var(--sans); font-weight: 800;
  font-size: clamp(56px, 16vw, 280px);
  line-height: 0.85; letter-spacing: -0.045em;
  text-transform: uppercase;
  white-space: nowrap; overflow: hidden;
  color: var(--fg);
}
.footer-big .ital { font-family: var(--serif); font-weight: 400; font-style: italic; color: var(--accent); }
.footer {
  padding: 40px var(--pad);
  border-top: 1px solid var(--line);
  max-width: var(--maxw); margin: 40px auto 0;
  display: flex; justify-content: space-between; align-items: center;
  gap: 24px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--fg-dim);
}
.footer-social { display: inline-flex; gap: 18px; flex-wrap: wrap; }
.footer a:hover { color: var(--fg); }

/* ============================================
   TWEAKS PANEL
   ============================================ */
.tweaks {
  position: fixed; bottom: 20px; right: 20px; z-index: 80;
  width: 280px;
  background: rgba(15, 10, 22, 0.96);
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  color: var(--fg);
  font-family: var(--mono); font-size: 11px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.tweaks-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--line); text-transform: uppercase; letter-spacing: 0.18em; }
.tweaks-head .t { color: var(--accent); }
.tweaks-body { padding: 14px; display: flex; flex-direction: column; gap: 16px; }
.tweaks-body label { display: flex; flex-direction: column; gap: 8px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.16em; font-size: 10px; }
.tweak-colors { display: flex; gap: 8px; flex-wrap: wrap; }
.tweak-colors button { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; transition: border-color .2s; }
.tweak-colors button.active { border-color: var(--fg); }
.tweak-segmented { display: grid; grid-auto-flow: column; gap: 1px; background: var(--line-strong); border: 1px solid var(--line-strong); border-radius: 4px; overflow: hidden; }
.tweak-segmented button { padding: 8px 6px; background: rgba(15,10,22,0.9); color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.14em; font-size: 10px; }
.tweak-segmented button.active { background: var(--fg); color: var(--bg); }
.tweak-toggle { display: flex; justify-content: space-between; align-items: center; color: var(--fg); text-transform: uppercase; letter-spacing: 0.14em; font-size: 10px; cursor: none; }
.tweak-toggle .sw { width: 34px; height: 18px; border-radius: 999px; background: var(--line-strong); position: relative; transition: background .2s; }
.tweak-toggle .sw::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--fg); transition: transform .2s; }
.tweak-toggle.on .sw { background: var(--accent); }
.tweak-toggle.on .sw::after { transform: translateX(16px); }

@media (max-width: 800px) { .tweaks { display: none; } }
</style>
